# NEKKO — parámetros de configuración (Phase 0)
# Regla del PRD: toda ventaja reportada es NETA de estos costos. Nunca bruta.

fees:
  # Comisión Polymarket (verificado 2026-07-18 contra docs.polymarket.com/trading/fees):
  #   fee_usd = shares * taker_fee_rate * p * (1 - p)   [p = precio de la share]
  # Solo paga el taker; makers pagan 0. Cripto: feeRate = 0.07
  # (efectivo máximo ~1.75% del notional en p=0.50, decrece hacia los extremos).
  # Nota: las fees se introdujeron a fines de 2025; mercados históricos anteriores
  # operaban sin fee, pero el backtest aplica el esquema ACTUAL porque la pregunta
  # es si la ventaja sería explotable HOY.
  taker_fee_rate_crypto: 0.07
  maker_fee_rate: 0.0

spread:
  # El historial de precios no conserva bid/ask (libro es live-only), así que el
  # costo de ejecución se ASUME. Base empírica: muestreo en vivo 2026-07-18 sobre
  # 42 mercados cripto activos con mid en [0.05, 0.95]:
  #   spread mediana = 0.01 | p75 = 0.02 (estable entre bandas de volumen 1k-100k)
  # Convención del backtest: la serie histórica se trata como mid; una entrada
  # taker ejecuta a mid + assumed_spread/2 (y la salida a mid - assumed_spread/2).
  assumed_spread: 0.02             # escenario base (p75, conservador)
  assumed_spread_optimistic: 0.01  # mediana — solo para análisis de sensibilidad
  execution_style: taker           # cruzar el spread; sin supuestos de maker fills

collector:
  grid_interval_s: 300       # snapshot de grilla fija cada 5 min (PRD F2)
  spot_check_s: 30           # chequeo de spot Binance entre grillas
  event_move_pct: 0.3        # % de movimiento del spot que dispara snapshot extra
  universe_refresh_s: 900    # refresco del universo de mercados activos
  min_volume_24h: 1000       # filtro de mercados a trackear
  max_markets: 80            # tope de mercados simultáneos (PRD pide >=50)
  depth_band_pct: 5          # profundidad del libro: USDC dentro de ±5% del mid

paper:
  # Motor detector + paper trading (ADR-0008). Modo shadow: solo lee snapshots
  # y escribe operaciones VIRTUALES en paper_ops. No toca nada real.
  poll_s: 60
  stake_usdc: 50               # tamaño objetivo por posición virtual
  max_fill_fraction: 0.25      # nunca "llenar" más del 25% de la profundidad visible
  min_depth_usdc: 50           # sin este piso de profundidad, no hay fill
  max_spread: 0.05             # spread mayor => mercado intocable
  max_open_per_strategy: 10
  strategies:
    # DRAFT: reglas escritas ANTES de tener tesis validada. Sus KPIs no valen
    # para ningún gate (ADR-0008). Parámetros acá, nunca hardcodeados.
    draft_thesis_C:            # reversión por shock: spot se movió, libro quieto
      spot_move_pct: 0.4       # movimiento mínimo de Binance entre snapshots (%)
      stale_mid_eps: 0.005     # "libro quieto" = mid se movió menos que esto
      lookback_s_min: 30       # ventana para comparar contra snapshot previo
      lookback_s_max: 900
      edge_min: 0.03           # gap modelo vs precio de entrada para disparar
      exit_eps: 0.01           # salir cuando |modelo - mid| converge a esto
      max_hold_s: 3600
    draft_thesis_D:            # seguir la latencia: spot se movió, entrar ya
      spot_move_pct: 0.4
      edge_min: 0.02
      hold_s: 1800

markets:
  # Filtros para F1/F2. Tag ids verificados en docs/API-VERIFICATION.md.
  tag_crypto: 21
  tag_bitcoin: 235
  # Los "Up or Down" de 5 min inundan la muestra; son grupo de control (PRD §6).
  control_group_question_pattern: "Up or Down"
  price_band_analysis: [0.05, 0.95]  # fuera de esto el spread relativo domina
