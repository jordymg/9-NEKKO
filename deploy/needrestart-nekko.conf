# NEKKO hardening (s8) — instalar en /etc/needrestart/conf.d/nekko.conf
#
# Motivo: el 2026-07-21 06:45–06:50 UTC needrestart (en modo automático, tras
# unattended-upgrades) reinició servicios y provocó blips de resolución DNS
# justo después. En una VM de experimento con fecha de muerte preferimos la
# ESTABILIDAD del colector a aplicar libs nuevas a procesos vivos al instante.
#
# Modo 'l' (list-only): needrestart detecta qué haría falta reiniciar pero NO
# reinicia nada. Los servicios siguen con las libs viejas hasta el reboot de
# teardown (post-2026-08-03). Trade-off aceptado y documentado.
$nrconf{restart} = 'l';
